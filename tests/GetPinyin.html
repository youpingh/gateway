<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Get Pinyin (Google)</title>
</head>

<body>
  <div style="margin-top: 20px">
    <textarea id="pinyinText" rows="3" cols="50">今天的天气不错</textarea><br>
    <button onclick="getPinyin()">Get Pinyin</button>
    <p id="pinyin"></p>
  </div>

  <div style="margin-top: 20px">
    <textarea id="transText" rows="3" cols="50">天</textarea><br>
    <button onclick="getTranslation()">Get Translation</button>
    <p id="trans"></p>
  </div>

  <script>
    const TTS_URL = 'http://127.0.0.1:3000/pinyin';
    // const TTS_URL = 'https://learner-gateway.uc.r.appspot.com/pinyin';

    // Calls to Google Translate service to get the pinyin of the text
    async function getPinyin() {

      const text = document.getElementById('pinyinText').value;
      const requestBody = {
        text: text
      }

      try {
        const response = await fetch(TTS_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestBody)
        });

        const results = await response.json();
        const element = document.getElementById('pinyin');
        element.textContent = results.text + ', ' + results.pinyin;
      } catch (error) {
        console.error("Error: " + error.message);
      }
    }

    // Calls to Google Translate service to get the translation of the text
    async function getTranslation() {

      const text = document.getElementById('transText').value;
      const requestBody = {
        text: text
      }

      try {
        const response = await fetch(TTS_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestBody)
        });

        const results = await response.json();
        const element = document.getElementById('trans');
        element.textContent = results.text + ', ' + JSON.stringify(results, null, 2);
      } catch (error) {
        console.error("Error: " + error.message);
      }
    }
  </script>
</body>

</html>
